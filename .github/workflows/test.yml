name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Resolve o warning do GitHub (força Node 24)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      PORT: 3000
      HOST: localhost
      LOG_LEVEL: info
      LOG_LEVELS_FILES: info,error
      LOG_ROTATION_SIZE: 10m
      LOG_ROTATION_INTERVAL: 1d
      LOG_KEEP_COUNT: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: test_run
        run: |
          # 1. Roda os testes sem cores e salva
          bun test --coverage --no-color > coverage.txt
          cat coverage.txt

          # 2. Captura o valor usando AWK (mais estável que grep + regex)
          # Ele procura a linha 'All files' e pega a coluna onde está o % de linhas
          SUMMARY=$(awk '/All files/ {print $6}' coverage.txt)

          echo "COVERAGE=$SUMMARY" >> $GITHUB_OUTPUT
          echo "Valor capturado: $SUMMARY"

          # 3. Validação de Threshold usando AWK (evita dependência do bc)
          THRESHOLD=90
          CHECK=$(awk -v n1="$SUMMARY" -v n2="$THRESHOLD" 'BEGIN {print (n1 < n2 ? "fail" : "pass")}')

          if [ "$CHECK" = "fail" ]; then
            echo "❌ Coverage insuficiente: $SUMMARY% (Mínimo: $THRESHOLD%)"
            exit 1
          else
            echo "✅ Coverage aceitável: $SUMMARY%"
          fi

      - name: Create Badge JSON
        run: |
          mkdir -p badges
          # Pegando o valor do output do step anterior
          VAL="${{ steps.test_run.outputs.COVERAGE }}"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$VAL%\", \"color\": \"brightgreen\"}" > badges/coverage.json

      - name: Deploy Badge to Branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges-data
