name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Força Node 24 para sumir com os warnings de depreciação
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      PORT: 3000
      HOST: localhost
      LOG_LEVEL: info
      LOG_LEVELS_FILES: info,error
      LOG_ROTATION_SIZE: 10m
      LOG_ROTATION_INTERVAL: 1d
      LOG_KEEP_COUNT: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: test_run
        run: |
          # Executa os testes e garante que a saída vá para o arquivo sem cores
          bun test --coverage --no-color 2>&1 | tee coverage.txt

          # Extração robusta:
          # 1. Filtra a linha 'All files'
          # 2. Remove pipes (|) e espaços extras
          # 3. Pega o segundo número decimal (que é o % de linhas)
          SUMMARY=$(grep "All files" coverage.txt | tr -d '|' | grep -oE '[0-9]+\.[0-9]+' | sed -n '2p')

          # Fallback: se não achar o segundo (Lines), tenta o primeiro (Funcs)
          if [ -z "$SUMMARY" ]; then
            SUMMARY=$(grep "All files" coverage.txt | tr -d '|' | grep -oE '[0-9]+\.[0-9]+' | head -n 1)
          fi

          echo "COVERAGE=$SUMMARY" >> $GITHUB_OUTPUT
          echo "✅ Valor final extraído: $SUMMARY"

          # Validação de Threshold (Mínimo 90%)
          THRESHOLD=90
          CHECK=$(awk -v n1="$SUMMARY" -v n2="$THRESHOLD" 'BEGIN {print (n1 < n2 ? "fail" : "pass")}')

          if [ "$CHECK" == "fail" ]; then
            echo "❌ Coverage de $SUMMARY% é menor que o mínimo de $THRESHOLD%"
            exit 1
          fi

      - name: Create Badge JSON
        if: success()
        run: |
          mkdir -p badges
          VAL="${{ steps.test_run.outputs.COVERAGE }}"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$VAL%\", \"color\": \"brightgreen\"}" > badges/coverage.json

      - name: Deploy Badge to Branch
        if: github.ref == 'refs/heads/main' && success()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges-data
