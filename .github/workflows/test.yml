name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Permissões necessárias para criar a branch de badges e fazer o deploy
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: test_run # Adicionado ID para referenciar o output
        run: |
          # Rodamos o teste uma vez e salvamos o output
          OUTPUT=$(bun test --coverage)
          echo "$OUTPUT"

          # Extrai o valor
          SUMMARY=$(echo "$OUTPUT" | grep "All files" | awk '{print $6}')
          echo "COVERAGE=$SUMMARY" >> $GITHUB_OUTPUT

          # Validação de Threshold
          COVERAGE_THRESHOLD=90
          if (( $(echo "$SUMMARY < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Coverage está abaixo de $COVERAGE_THRESHOLD% ($SUMMARY%)"
            exit 1
          else
            echo "✅ Coverage aceitável ($SUMMARY%)!"
          fi

      - name: Create Badge JSON
        # Este passo só roda se os testes passarem
        run: |
          mkdir -p badges
          # Define a cor baseada no valor (opcional, mas legal)
          COLOR="brightgreen"
          COVERAGE=${{ steps.test_run.outputs.COVERAGE }}

          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$COVERAGE%\", \"color\": \"$COLOR\"}" > badges/coverage.json

      - name: Deploy Badge to Branch
        # Só faz deploy se estiver na branch main (evita criar badges de PRs experimentais)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges-data
