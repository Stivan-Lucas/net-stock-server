name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

# Permissões necessárias para criar a branch de badges e fazer o deploy
permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest

    env:
      NODE_ENV: test
      PORT: 3000
      HOST: localhost
      LOG_LEVEL: info
      LOG_LEVELS_FILES: info,error
      LOG_ROTATION_SIZE: 10m
      LOG_ROTATION_INTERVAL: 1d
      LOG_KEEP_COUNT: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: test_run
        run: |
          # Rodamos o teste e salvamos em um arquivo temporário para garantir a leitura
          bun test --coverage > coverage_output.txt
          cat coverage_output.txt

          # Extrai apenas o número decimal da linha "All files"
          # Procuramos por algo como "97.58" ou "100.00"
          SUMMARY=$(grep "All files" coverage_output.txt | grep -oE "[0-9]+\.[0-9]+")

          echo "Captured Coverage: $SUMMARY"
          echo "COVERAGE=$SUMMARY" >> $GITHUB_OUTPUT

          # Validação de Threshold
          COVERAGE_THRESHOLD=90
          if (( $(echo "$SUMMARY < $COVERAGE_THRESHOLD" | bc -l) )); then
            echo "❌ Coverage insuficiente: $SUMMARY%"
            exit 1
          fi

      - name: Create Badge JSON
        # Este passo só roda se os testes passarem
        run: |
          mkdir -p badges
          # Define a cor baseada no valor (opcional, mas legal)
          COLOR="brightgreen"
          COVERAGE=${{ steps.test_run.outputs.COVERAGE }}

          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$COVERAGE%\", \"color\": \"$COLOR\"}" > badges/coverage.json

      - name: Deploy Badge to Branch
        # Só faz deploy se estiver na branch main (evita criar badges de PRs experimentais)
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges-data
