name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    env:
      # Resolve o warning do GitHub (força Node 24)
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      NODE_ENV: test
      PORT: 3000
      HOST: localhost
      LOG_LEVEL: info
      LOG_LEVELS_FILES: info,error
      LOG_ROTATION_SIZE: 10m
      LOG_ROTATION_INTERVAL: 1d
      LOG_KEEP_COUNT: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run tests with coverage
        id: test_run
        run: |
          # Rodamos com --no-color para garantir que o texto venha limpo
          bun test --coverage --no-color > coverage.txt
          cat coverage.txt

          # Extração ultra-robusta:
          # 1. Pega a linha do 'All files'
          # 2. Extrai o primeiro número decimal que encontrar (o % de linhas)
          SUMMARY=$(grep "All files" coverage.txt | grep -oE '[0-9]+\.[0-9]+' | head -n 1)

          echo "COVERAGE=$SUMMARY" >> $GITHUB_OUTPUT
          echo "Valor capturado: $SUMMARY"

          # Validação simplificada
          THRESHOLD=90
          if (( $(echo "$SUMMARY < $THRESHOLD" | bc -l) )); then
            echo "Coverage abaixo de $THRESHOLD%"
            exit 1
          fi

      - name: Create Badge JSON
        run: |
          mkdir -p badges
          # Pegando o valor do output do step anterior
          VAL="${{ steps.test_run.outputs.COVERAGE }}"
          echo "{\"schemaVersion\": 1, \"label\": \"coverage\", \"message\": \"$VAL%\", \"color\": \"brightgreen\"}" > badges/coverage.json

      - name: Deploy Badge to Branch
        if: github.ref == 'refs/heads/main'
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./badges
          publish_branch: badges-data
